<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="surface" x1="72" y1="48" x2="440" y2="464" gradientUnits="userSpaceOnUse">
      <stop stop-color="#147DFF"/>
      <stop offset="1" stop-color="#0756D9"/>
    </linearGradient>
    <linearGradient id="wave" x1="256" y1="112" x2="256" y2="400" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#DCEEFF"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#00378F" flood-opacity=".28"/>
    </filter>
  </defs>

  <!-- A compact, high-contrast silhouette that remains legible at 16 px. -->
  <rect x="28" y="28" width="456" height="456" rx="112" fill="url(#surface)"/>
  <path d="M140 29h232c62 0 111 49 111 111v12C429 96 354 63 256 63S83 96 29 152v-12C29 78 78 29 140 29Z" fill="#FFFFFF" opacity=".08"/>

  <!-- Seven rounded bars form a balanced, unmistakable audio waveform. -->
  <g fill="url(#wave)" filter="url(#shadow)">
    <rect x="94" y="220" width="28" height="72" rx="14"/>
    <rect x="143" y="184" width="28" height="144" rx="14"/>
    <rect x="192" y="146" width="28" height="220" rx="14"/>
    <rect x="241" y="112" width="30" height="288" rx="15"/>
    <rect x="292" y="146" width="28" height="220" rx="14"/>
    <rect x="341" y="184" width="28" height="144" rx="14"/>
    <rect x="390" y="220" width="28" height="72" rx="14"/>
  </g>
</svg>
