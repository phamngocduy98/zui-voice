name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - run: npm ci
      - run: npm test
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: Zui. Voice ${{ github.ref_name }}
          releaseBody: |
            Windows x64 release of Zui. Voice.

            On first launch, the app downloads the versioned speech engine and Vietnamese model from this release and verifies their SHA-256 checksums before installation.
          releaseDraft: true
          prerelease: false
          args: --bundles nsis
